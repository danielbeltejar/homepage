namespace: pre-homepage-front
replicaCount: 1
registry: harbor.server.local/danielbeltejar/homepage
image:
  pullPolicy: IfNotPresent
service:
  type: ClusterIP
  port: 80
  targetPort: 8080
extraEnv:
- name: "TZ"
  value: "UTC"
extraEnvFrom: []
resources:
  requests:
    memory: "32Mi"
  limits:
    memory: "128Mi"
volumes:
- name: tmpfs-tmp
  emptyDir:
    medium: Memory
- name: tmpfs-var-lib-nginx-tmp
  emptyDir:
    medium: Memory
- name: tmpfs-run-nginx
  emptyDir:
    medium: Memory
- name: tmpfs-var-lib-nginx-logs
  emptyDir:
    medium: Memory
volumeMounts:
- name: tmpfs-tmp
  mountPath: /tmp
- name: tmpfs-var-lib-nginx-tmp
  mountPath: /var/lib/nginx/tmp
- name: tmpfs-run-nginx
  mountPath: /run/nginx
- name: tmpfs-var-lib-nginx-logs
  mountPath: /var/lib/nginx/logs
ingress:
  enabled: true
  annotations:
    nginx.ingress.kubernetes.io/proxy-set-header: X-Real-IP $remote_addr
    nginx.ingress.kubernetes.io/use-forwarded-headers: "true"
    cert-manager.io/cluster-issuer: letsencrypt-ovh
  class: "nginx-local"
  host: "admin.homepage.pre.danielbeltejar.es"
  tls: true
