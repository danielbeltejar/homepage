namespace: pre-homepage-back
replicaCount: 1
registry: harbor.server.local/danielbeltejar/homepage
image:
  pullPolicy: IfNotPresent
service:
  type: ClusterIP
  port: 80
  targetPort: 8000
extraEnv:
- name: "TZ"
  value: "UTC"
- name: "POSTS_DIR"
  value: "/app/posts"
extraEnvFrom:
- secretRef:
    name: admin-credentials
resources:
  requests:
    memory: "32Mi"
  limits:
    memory: "128Mi"
auth:
  username: admin
  passwordHash: "$2b$12$CHANGE_ME_IN_PRODUCTION"
  jwtSecret: "CHANGE_ME_IN_PRODUCTION"
persistence:
  enabled: true
  existingClaim: posts-data
  mountPath: /app/posts
