apiVersion: v1
kind: Secret
metadata:
  name: admin-credentials
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
type: Opaque
stringData:
  ADMIN_USERNAME: {{ .Values.auth.username | quote }}
  ADMIN_PASSWORD_HASH: {{ .Values.auth.passwordHash | quote }}
  JWT_SECRET: {{ .Values.auth.jwtSecret | quote }}
